version: 0.0
os: linux

# ============================================================
# appspec.yml — Naresh Portfolio (Static HTML/CSS/JS)
# Deploys static files to /var/www/html and serves via Nginx
# ============================================================

files:
  - source: /
    destination: /var/www/html
    overwrite: yes

file_exists_behavior: OVERWRITE

hooks:
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/set_permissions.sh
      timeout: 60
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: root

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 30
      runas: root
