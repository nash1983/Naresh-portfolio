version: 0.2

phases:
  pre_build:
    commands:
      - echo "Starting build for Naresh portfolio"
      - ls -la
      - test -f index.html || (echo "ERROR - index.html not found" && exit 1)

  build:
    commands:
      - echo "Static site - no build step required"
      - echo "Packaging files for deployment"

  post_build:
    commands:
      - echo "Build complete"
artifacts:
  files:
    - "**/*"
  exclude-paths:
    - ".git/**"
    - ".git"
  
  discard-paths: no
