AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Naresh Portfolio — Full CI/CD Infrastructure
  Region: ap-southeast-2 (Sydney)
  EC2: Amazon Linux 2 (t2.micro — Free Tier eligible)
  Auto Scaling: Min 1, Max 2
  Includes: VPC, ALB, ASG, CodePipeline, CodeBuild, CodeDeploy, IAM, S3

# ============================================================
# PARAMETERS
# ============================================================
Parameters:

  AppName:
    Type: String
    Default: naresh-portfolio
    Description: Application name used as prefix for all resource names

  GitHubOwner:
    Type: String
    Default: nash1983
    Description: GitHub username

  GitHubRepo:
    Type: String
    Default: Naresh-portfolio
    Description: GitHub repository name (without .git)

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch to deploy from

  GitHubConnectionArn:
    Type: String
    Description: >
      ARN of the AWS CodeConnections connection to GitHub.
      Create at: Developer Tools > Settings > Connections
    AllowedPattern: 'arn:aws:codeconnections:.*'
    ConstraintDescription: Must be a valid CodeConnections ARN

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: >
      EC2 Key Pair for SSH access.
      Create at: EC2 > Key Pairs > Create key pair

  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t3.micro
    Description: >
      EC2 instance type. t2.micro is Free Tier eligible in ap-southeast-2.

# ============================================================
# MAPPINGS — Amazon Linux 2 AMI for Sydney (ap-southeast-2)
# ============================================================
Mappings:
  RegionAMI:
    ap-southeast-2:
      AmazonLinux2: ami-0892a9c01908fafd1

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ----------------------------------------------------------
  # NETWORKING — VPC, Subnets, Internet Gateway, Route Tables
  # ----------------------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-vpc'
        - Key: Project
          Value: !Ref AppName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-igw'

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnet in AZ-a (Sydney)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: ap-southeast-2a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-public-subnet-2a'

  # Public Subnet in AZ-b (Sydney) — required for ALB (needs 2 AZs)
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: ap-southeast-2b
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-public-subnet-2b'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ----------------------------------------------------------
  # SECURITY GROUPS
  # ----------------------------------------------------------

  # ALB Security Group — allows HTTP/HTTPS from anywhere on the internet
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — allow HTTP and HTTPS from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-alb-sg'

  # EC2 Security Group — allows HTTP only from ALB, SSH from anywhere
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 — allow HTTP from ALB only, SSH for debugging
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: HTTP from ALB only
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH — restrict to your IP in production
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-ec2-sg'

  # ----------------------------------------------------------
  # S3 — Artifact bucket for CodePipeline
  # ----------------------------------------------------------

  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub '${AppName}-artifacts-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: CleanOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-artifacts'

  # ----------------------------------------------------------
  # IAM ROLES
  # ----------------------------------------------------------

  # Role for EC2 instances — allows SSM, CloudWatch, and S3 artifact access
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AppName}-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: EC2ArtifactAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub '${ArtifactBucket.Arn}/*'
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-ec2-role'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AppName}-ec2-profile'
      Roles:
        - !Ref EC2InstanceRole

  # Role for CodeBuild — allows logging, S3, and CodeBuild actions
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AppName}-codebuild-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub '${ArtifactBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - codebuild:CreateReportGroup
                  - codebuild:CreateReport
                  - codebuild:UpdateReport
                  - codebuild:BatchPutTestCases
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-codebuild-role'

  # Role for CodeDeploy — uses AWS managed policy
  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AppName}-codedeploy-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRole
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-codedeploy-role'

  # Role for CodePipeline — orchestrates all stages
  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AppName}-pipeline-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub '${ArtifactBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetApplication
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetDeploymentGroup
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CodeDeployRole.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-pipeline-role'

  # ----------------------------------------------------------
  # APPLICATION LOAD BALANCER
  # ----------------------------------------------------------

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${AppName}-alb'
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-alb'
        - Key: Project
          Value: !Ref AppName

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${AppName}-tg'
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-tg'

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ----------------------------------------------------------
  # EC2 — Launch Template + Auto Scaling Group
  # Sydney region | Amazon Linux 2 | t2.micro (Free Tier)
  # Min: 1 instance | Max: 2 instances
  # ----------------------------------------------------------

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${AppName}-lt'
      LaunchTemplateData:
        # Amazon Linux 2 AMI — ap-southeast-2 (Sydney)
        ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AmazonLinux2]
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        # UserData runs once on first boot — installs Nginx and CodeDeploy agent
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -ex

            # System update
            yum update -y

            # Install required packages
            yum install -y ruby wget nginx curl

            # Enable and start Nginx
            systemctl enable nginx

            # Create web root if not present
            mkdir -p /var/www/html
            chown -R nginx:nginx /var/www/html

            # Install AWS CodeDeploy agent (Sydney region endpoint)
            cd /tmp
            wget https://aws-codedeploy-ap-southeast-2.s3.ap-southeast-2.amazonaws.com/latest/install
            chmod +x ./install
            ./install auto

            # Enable and start CodeDeploy agent
            systemctl enable codedeploy-agent
            systemctl start codedeploy-agent

            # Signal CloudFormation that the instance is ready
            /opt/aws/bin/cfn-signal -e $? \
              --stack ${AWS::StackName} \
              --resource AutoScalingGroup \
              --region ${AWS::Region}
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${AppName}-instance'
              - Key: Project
                Value: !Ref AppName
              - Key: Environment
                Value: production

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: VPCGatewayAttachment
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT10M
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT5M
        WaitOnResourceSignals: true
    Properties:
      AutoScalingGroupName: !Sub '${AppName}-asg'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      # --- Sydney-specific AZs ---
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      # --- FREE TIER: min 1, max 2 ---
      MinSize: '1'
      MaxSize: '2'
      DesiredCapacity: '1'
      # Register instances with the ALB target group
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-instance'
          PropagateAtLaunch: true
        - Key: Project
          Value: !Ref AppName
          PropagateAtLaunch: true

  # Optional: scale up when CPU > 70%
  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: '300'

  ScaleUpAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AppName}-cpu-high'
      AlarmDescription: Scale up when CPU > 70% for 2 consecutive minutes
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 70
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup
      AlarmActions:
        - !Ref ScaleUpPolicy

  # ----------------------------------------------------------
  # CODEBUILD — builds and packages your static site
  # ----------------------------------------------------------

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${AppName}-build'
      Description: Builds and packages the Naresh portfolio static site
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: APP_NAME
            Value: !Ref AppName
      Artifacts:
        Type: CODEPIPELINE
      Cache:
        Type: S3
        Location: !Sub '${ArtifactBucket}/codebuild-cache'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub '/aws/codebuild/${AppName}-build'
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-build'
        - Key: Project
          Value: !Ref AppName

  # ----------------------------------------------------------
  # CODEDEPLOY — deploys artifact to EC2 via Nginx
  # ----------------------------------------------------------

  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub '${AppName}-app'
      ComputePlatform: Server

  DeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: !Sub '${AppName}-dg'
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      # Rolling deployment — keeps one instance live while the other is updated
      DeploymentStyle:
        DeploymentType: IN_PLACE
        DeploymentOption: WITH_TRAFFIC_CONTROL
      LoadBalancerInfo:
        TargetGroupInfoList:
          - Name: !GetAtt TargetGroup.TargetGroupName
      AutoScalingGroups:
        - !Ref AutoScalingGroup
      # Deploy to one instance at a time — safe for min:1 setup
      DeploymentConfigName: CodeDeployDefault.OneAtATime
      # Auto rollback on failure
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE
          - DEPLOYMENT_STOP_ON_ALARM
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-dg'

  # ----------------------------------------------------------
  # CODEPIPELINE — Source → Build → Deploy
  # ----------------------------------------------------------

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub '${AppName}-pipeline'
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:

        # Stage 1: Pull source code from GitHub
        - Name: Source
          Actions:
            - Name: GitHub_Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub '${GitHubOwner}/${GitHubRepo}'
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1

        # Stage 2: CodeBuild packages the static site
        - Name: Build
          Actions:
            - Name: Build_And_Package
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

        # Stage 3: CodeDeploy copies files to EC2 via appspec.yml hooks
        - Name: Deploy
          Actions:
            - Name: Deploy_To_EC2
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeploy
                Version: '1'
              Configuration:
                ApplicationName: !Ref CodeDeployApplication
                DeploymentGroupName: !Ref DeploymentGroup
              InputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

      Tags:
        - Key: Name
          Value: !Sub '${AppName}-pipeline'
        - Key: Project
          Value: !Ref AppName

# ============================================================
# OUTPUTS — values displayed after stack creation completes
# ============================================================
Outputs:

  LoadBalancerDNS:
    Description: >
      Public URL of your portfolio — open this in a browser after deployment
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
    Export:
      Name: !Sub '${AppName}-alb-url'

  PipelineConsoleURL:
    Description: Direct link to your CodePipeline in the AWS Console
    Value: !Sub >-
      https://ap-southeast-2.console.aws.amazon.com/codesuite/codepipeline/pipelines/${AppName}-pipeline/view?region=ap-southeast-2

  CodeBuildConsoleURL:
    Description: Direct link to your CodeBuild project logs
    Value: !Sub >-
      https://ap-southeast-2.console.aws.amazon.com/codesuite/codebuild/${AWS::AccountId}/projects/${AppName}-build/?region=ap-southeast-2

  CodeDeployConsoleURL:
    Description: Direct link to your CodeDeploy deployment group
    Value: !Sub >-
      https://ap-southeast-2.console.aws.amazon.com/codesuite/codedeploy/deployments?region=ap-southeast-2

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AppName}-vpc-id'

  AutoScalingGroupName:
    Description: Auto Scaling Group name
    Value: !Ref AutoScalingGroup

  ArtifactBucketName:
    Description: >
      S3 bucket storing pipeline artifacts.
      Run: aws s3 rm s3://BUCKET_NAME --recursive  BEFORE deleting the stack.
    Value: !Ref ArtifactBucket
